name: Build & Release Firmware

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e sandysoil-8z

      - name: Extract version
        id: version
        run: |
          VER=$(grep 'define FW_VERSION' src/config.h | grep -oP '"\K[^"]+')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT

      - name: Delete existing release if same tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ steps.version.outputs.tag }} --yes 2>/dev/null || true
          git push origin :refs/tags/${{ steps.version.outputs.tag }} 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            .pio/build/sandysoil-8z/firmware.bin \
            --title "Firmware ${{ steps.version.outputs.version }}" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --latest
