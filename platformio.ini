; ==============================================================
;  Sandy Soil 8Z — PlatformIO configuration
;  Hardware: KC868-A8v3 (ESP32-S3, 16 MB flash)
; ==============================================================

[env:sandysoil-8z]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash / partitions ────────────────────────────────────────
; KC868-A8v3 has 8 MB flash (with 8 MB PSRAM)
board_build.flash_size  = 8MB
board_build.partitions  = default_8MB.csv

; ── Serial monitor ────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ── Build ─────────────────────────────────────────────────────
build_flags =
    -DARDUINO_ESP32S3_DEV
    -DASYNCWEBSERVER_REGEX=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── Libraries ─────────────────────────────────────────────────
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.5
    bblanchon/ArduinoJson @ ^7.0.0
    mathieucarbou/ESPAsyncWebServer @ ^3.3.0
    mathieucarbou/AsyncTCP @ ^3.3.0
    knolleary/PubSubClient @ ^2.8.0

; ── USB upload (cable) ────────────────────────────────────────
upload_protocol = esptool
upload_speed    = 921600
upload_port     = COM5

; For USB-CDC on ESP32-S3
board_upload.use_1200bps_touch = true
board_upload.wait_for_upload_port = true

; ── OTA upload (Wi-Fi) ────────────────────────────────────────
; After first flash via USB, you can upload over the air:
;   1. Uncomment the three lines below
;   2. Set upload_port to the device IP shown in Serial Monitor
;   3. Run: pio run --target upload
;
; upload_protocol = espota
; upload_port     = 192.168.x.x   ; <- replace with device IP
; upload_flags    = --auth=irrigation8z
