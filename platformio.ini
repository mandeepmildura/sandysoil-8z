; ══════════════════════════════════════════════════════════════
;  Sandy Soil 8Z — PlatformIO configuration
;  Hardware: KC868-A8v3 (ESP32-S3, 8 MB flash)
; ══════════════════════════════════════════════════════════════

[env:sandysoil-8z]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash / partitions ────────────────────────────────────────
; 8 MB flash with OTA-capable partition layout
board_upload.flash_size    = 8MB
board_build.partitions     = default_8MB.csv

; ── Serial monitor ────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

; ── Build ─────────────────────────────────────────────────────
build_flags =
    -DARDUINO_ESP32S3_DEV

; ── Libraries ─────────────────────────────────────────────────
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^6.21
    arduino-libraries/NTPClient @ ^3.2

; ── USB upload (cable) ────────────────────────────────────────
upload_protocol = esptool
upload_speed    = 921600

; ── OTA upload (Wi-Fi) ────────────────────────────────────────
; After first flash, you can upload over the air:
;   1. Uncomment the two lines below
;   2. Set upload_port to the device IP shown in Serial Monitor
;   3. Run: pio run --target upload
;
; upload_protocol = espota
; upload_port     = 192.168.x.x   ; ← replace with device IP
; upload_flags    = --auth=irrigation8z
